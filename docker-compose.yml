services:
  newflow:
    build: .
    ports:
      # Production serves both project ports so the familiar dev URL keeps
      # working. Stop the container before running `npm run dev` (same ports).
      - "8451:8452"
      - "8452:8452"
    environment:
      - PORT=8452
    volumes:
      # Named volume, not a bind mount: this repo lives on /Volumes/Code,
      # which is outside Docker Desktop's file-sharing paths. Seed once with:
      #   docker cp data/. newflow-newflow-1:/app/data/
      - newflow-data:/app/data
      # SSH keys (read-only) so infra.ssh works from inside the container.
      - ${HOME}/.ssh:/root/.ssh:ro
      # Docker socket so infra.docker builds against the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8452/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Real database for real tests: seeded demo data, reachable from newflow
  # at postgres://newflow:newflow@postgres:5432/demo (compose network only).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newflow
      POSTGRES_PASSWORD: newflow
      POSTGRES_DB: demo
    volumes:
      - pg-data:/var/lib/postgresql/data
      # Repo lives outside Docker file sharing on this host — seed manually:
      #   docker exec -i newflow-postgres-1 psql -U newflow -d demo < docker/initdb/01-demo.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newflow -d demo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  newflow-data:
  pg-data:
